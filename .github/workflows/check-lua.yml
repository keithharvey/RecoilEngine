name: Check Lua library
on:
  workflow_dispatch:
  pull_request:
    paths:
      - rts/Lua/**
      - rts/Rml/SolLua/**/*.cpp
      - rts/Sim/Units/Scripts/**/*.cpp
      - doc/site/mise.toml
  push:
    branches:
      - master
    paths:
      - rts/Lua/**
      - rts/Rml/SolLua/**/*.cpp
      - rts/Sim/Units/Scripts/**/*.cpp
      - doc/site/mise.toml
env:
  RECOIL_LUA_LIBRARY_DIR: "rts/Lua/library"
  LUA_DOC_EXTRACTOR_SOURCE_REF: "https://github.com/${{ github.repository }}/blob/${{ github.sha }}"
  LUA_DOC_EXTRACTOR_VERSION: "3"
  LUA_LANGUAGE_SERVER_VERSION: "3.15.0"
jobs:
  check-library:
    name: Check library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Lua CPP files
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            rts/Lua
            rts/Rml/SolLua
            rts/Sim/Units/Scripts
            doc/site/mise.toml

      - uses: jdx/mise-action@v2
        with:
          working_directory: ./doc/site
          mise_toml: |
            [tools]
            lua-language-server = "{{env.LUA_LANGUAGE_SERVER_VERSION}}"
            "npm:lua-doc-extractor" = "{{env.LUA_DOC_EXTRACTOR_VERSION}}"

      - name: Override lua-doc-extractor from source
        if: vars.LUA_DOC_EXTRACTOR_REPO != ''
        run: |
          git clone --depth 1 \
            --branch "${{ vars.LUA_DOC_EXTRACTOR_BRANCH || 'main' }}" \
            "https://github.com/${{ vars.LUA_DOC_EXTRACTOR_REPO }}.git" \
            /tmp/lua-doc-extractor
          cd /tmp/lua-doc-extractor
          npm ci && npm run build
          mkdir -p /tmp/override-bin
          printf '#!/bin/bash\nexec node /tmp/lua-doc-extractor/dist/src/cli.js "$@"\n' \
            > /tmp/override-bin/lua-doc-extractor
          chmod +x /tmp/override-bin/lua-doc-extractor
          echo "/tmp/override-bin" >> "$GITHUB_PATH"

      - name: Run lua-language-server --check
        working-directory: ./doc/site
        run: mise run lua_check

      - name: Upload Lua Library artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{github.run_id}}-library
          path: ${{env.RECOIL_LUA_LIBRARY_DIR}}
